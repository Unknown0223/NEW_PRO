name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch/tag/SHA)
        required: false
        default: staging
      skip_migrations:
        description: Skip database migrations
        required: false
        type: boolean
        default: false

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Deploy backend (Railway staging)
        run: |
          echo "Deploy staging backend from ref: ${{ github.sha }}"
          echo "Set RAILWAY_TOKEN + RAILWAY_SERVICE_ID in GitHub staging environment."
          echo "Suggested: railway up --service backend --environment staging"

      - name: Deploy frontend (Railway staging)
        run: |
          echo "Deploy staging frontend from ref: ${{ github.sha }}"
          echo "Suggested: railway up --service frontend --environment staging"

      - name: Run migrations
        if: ${{ !inputs.skip_migrations }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          cd backend
          npm ci
          npx prisma migrate deploy

      - name: Smoke check
        env:
          STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
        run: |
          if [ -n "$STAGING_HEALTH_URL" ]; then
            curl -sf "$STAGING_HEALTH_URL" | head -c 500
          else
            echo "STAGING_HEALTH_URL not configured — skip smoke"
          fi

      - name: Rollback hint
        if: failure()
        run: |
          echo "Rollback: redeploy previous Railway release or run backup:pre-release checklist"
