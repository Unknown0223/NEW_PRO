# Railway: servis «Root Directory» = backend
# https://docs.railway.com/reference/config-as-code
#
# Dockerfile CMD: migrate + API + BullMQ worker (importlar uchun worker majburiy).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# startCommand berilmasin — Dockerfile CMD: migrate deploy + node dist/src/index.js
