# Minimal OpenAPI 3.0 artefakt — CI `openapi:lint` va keyingi to‘ldirish uchun.
# To‘liq API hali bu yerda emas; strategiya: backend/docs/openapi-strategy.md

openapi: 3.0.3
info:
  title: SALEC API (skeleton)
  description: |
    Infratuzilma va umumiy kontrakt tekshiruvi. Domain marshrutlari bosqichma-bosqich qo‘shiladi.
  version: "0.0.0"
  license:
    name: Unlicense

servers:
  - url: http://127.0.0.1:4000
    description: Local backend

paths:
  /health:
    $ref: "./paths/infra-auth.yaml#/~1health"
  /ready:
    $ref: "./paths/infra-auth.yaml#/~1ready"
  /api/auth/login:
    $ref: "./paths/infra-auth.yaml#/~1api~1auth~1login"
  /api/{slug}/orders:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1orders"
  /api/{slug}/dashboard/stats:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1dashboard~1stats"
  /api/{slug}/dashboard/supervisor:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1dashboard~1supervisor"
  /api/{slug}/dashboard/sales/summary:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1dashboard~1sales~1summary"
  /api/{slug}/dashboard/sales/analytics:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1dashboard~1sales~1analytics"
  /api/{slug}/dashboard/sales/breakdown:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1dashboard~1sales~1breakdown"
  /api/{slug}/dashboard/sales:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1dashboard~1sales"
  /api/{slug}/dashboard/finance:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1dashboard~1finance"
  /api/{slug}/payments:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1payments"
  /api/{slug}/products:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1products"
  /api/{slug}/stock/balances:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1stock~1balances"
  /api/{slug}/clients/references:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1clients~1references"
  /api/{slug}/clients:
    $ref: "./paths/tenant-core.yaml#/~1api~1{slug}~1clients"
  /api/{slug}/reports/income-report:
    $ref: "./paths/reports.yaml#/~1api~1{slug}~1reports~1income-report"
  /api/{slug}/reports/report-builder/preview:
    $ref: "./paths/reports.yaml#/~1api~1{slug}~1reports~1report-builder~1preview"
  /api/{slug}/reports/report-builder/dataset:
    $ref: "./paths/reports.yaml#/~1api~1{slug}~1reports~1report-builder~1dataset"
  /api/{slug}/reports/order-debts:
    $ref: "./paths/reports.yaml#/~1api~1{slug}~1reports~1order-debts"
  /api/{slug}/reports/sales:
    $ref: "./paths/reports.yaml#/~1api~1{slug}~1reports~1sales"
  /api/{slug}/access/permissions/catalog:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1access~1permissions~1catalog"
  /api/{slug}/access/me-permissions:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1access~1me-permissions"
  /api/{slug}/mobile/agent-config:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1mobile~1agent-config"
  /api/{slug}/mobile/sync/full:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1mobile~1sync~1full"
  /api/{slug}/mobile/sync/delta:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1mobile~1sync~1delta"
  /api/{slug}/mobile/orders/pending:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1mobile~1orders~1pending"
  /api/{slug}/mobile/fcm/register:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1mobile~1fcm~1register"
  /api/{slug}/mobile/orders/enqueue:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1mobile~1orders~1enqueue"
  /api/{slug}/access/users:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1access~1users"
  /api/{slug}/access/users/{id}/detail:
    $ref: "./paths/mobile-access.yaml#/~1api~1{slug}~1access~1users~1{id}~1detail"
  /api/{slug}/linkage/options:
    $ref: "./paths/settings-clients.yaml#/~1api~1{slug}~1linkage~1options"
  /api/{slug}/field/agent-visits:
    $ref: "./paths/settings-clients.yaml#/~1api~1{slug}~1field~1agent-visits"
  /api/{slug}/settings/profile:
    $ref: "./paths/settings-clients.yaml#/~1api~1{slug}~1settings~1profile"
  /api/{slug}/clients/{id}:
    $ref: "./paths/settings-clients.yaml#/~1api~1{slug}~1clients~1{id}"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        example: test1

  schemas:
    ApiError:
      type: object
      required: [error, requestId]
      properties:
        error:
          type: string
          example: NotReady
        requestId:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true
