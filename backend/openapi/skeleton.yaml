components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        example: test1

  schemas:
    ApiError:
      type: object
      required: [error, requestId]
      properties:
        error:
          type: string
          example: NotReady
        requestId:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true
