components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        example: test1
  schemas:
    ApiError:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          type: string
          example: NotReady
        requestId:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true
    AuthLoginBody:
      type: object
      properties:
        slug:
          type: string
          minLength: 1
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        device_name:
          type: string
          maxLength: 255
          nullable: true
        device_id:
          type: string
          maxLength: 64
          nullable: true
        user_agent:
          type: string
          maxLength: 512
          nullable: true
        apk_version:
          type: string
          maxLength: 64
          nullable: true
      required:
        - slug
        - login
        - password
      additionalProperties: false
    CreateOrderBody:
      type: object
      properties:
        client_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
        warehouse_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
        agent_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        expeditor_user_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        price_type:
          type: string
          minLength: 1
          maxLength: 128
          nullable: true
        order_type:
          type: string
          enum:
            - order
            - return
            - exchange
            - partial_return
            - return_by_order
        apply_bonus:
          type: boolean
        bonus_gift_overrides:
          type: array
          items:
            type: object
            properties:
              bonus_rule_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              bonus_product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
            required:
              - bonus_rule_id
              - bonus_product_id
            additionalProperties: false
        bonus_gift_lines:
          type: array
          items:
            type: object
            properties:
              bonus_rule_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              qty:
                type: number
                exclusiveMinimum: true
                minimum: 0
            required:
              - bonus_rule_id
              - product_id
              - qty
            additionalProperties: false
        comment:
          type: string
          maxLength: 4000
          nullable: true
        request_type_ref:
          type: string
          maxLength: 128
          nullable: true
        is_consignment:
          type: boolean
        consignment_due_date:
          type: string
          maxLength: 40
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              qty:
                type: number
                exclusiveMinimum: true
                minimum: 0
            required:
              - product_id
              - qty
            additionalProperties: false
          default: []
        payment_method_ref:
          type: string
          maxLength: 64
          nullable: true
        source_order_ids:
          type: array
          items:
            type: integer
            exclusiveMinimum: true
            minimum: 0
        minus_lines:
          type: array
          items:
            type: object
            properties:
              order_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              qty:
                type: number
                exclusiveMinimum: true
                minimum: 0
            required:
              - order_id
              - product_id
              - qty
            additionalProperties: false
        plus_lines:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              qty:
                type: number
                exclusiveMinimum: true
                minimum: 0
            required:
              - product_id
              - qty
            additionalProperties: false
        reason_ref:
          type: string
          maxLength: 256
          nullable: true
      required:
        - client_id
        - warehouse_id
      additionalProperties: false
    PatchOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          minLength: 1
        occurred_at:
          type: string
          format: date-time
        reason:
          type: string
          maxLength: 500
      required:
        - status
      additionalProperties: false
    BulkOrderStatusBody:
      type: object
      properties:
        order_ids:
          type: array
          items:
            type: integer
            exclusiveMinimum: true
            minimum: 0
          minItems: 1
          maxItems: 500
        status:
          type: string
          minLength: 1
        occurred_at:
          type: string
          format: date-time
      required:
        - order_ids
        - status
      additionalProperties: false
    PatchClientBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        legal_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        credit_limit:
          type: number
          minimum: 0
        address:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        client_type_code:
          type: string
          nullable: true
        responsible_person:
          type: string
          nullable: true
        landmark:
          type: string
          nullable: true
        inn:
          type: string
          nullable: true
        pdl:
          type: string
          nullable: true
        logistics_service:
          type: string
          nullable: true
        license_until:
          type: string
          nullable: true
        working_hours:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        neighborhood:
          type: string
          nullable: true
        street:
          type: string
          nullable: true
        house_number:
          type: string
          nullable: true
        apartment:
          type: string
          nullable: true
        gps_text:
          type: string
          nullable: true
        visit_date:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        client_format:
          type: string
          nullable: true
        client_code:
          type: string
          nullable: true
        sales_channel:
          type: string
          nullable: true
        product_category_ref:
          type: string
          nullable: true
        bank_name:
          type: string
          nullable: true
        bank_account:
          type: string
          nullable: true
        bank_mfo:
          type: string
          nullable: true
        client_pinfl:
          type: string
          nullable: true
        oked:
          type: string
          nullable: true
        contract_number:
          type: string
          nullable: true
        vat_reg_code:
          type: string
          nullable: true
        latitude:
          anyOf:
            - type: number
            - type: string
            - enum:
                - "null"
              nullable: true
        longitude:
          anyOf:
            - type: number
            - type: string
            - enum:
                - "null"
              nullable: true
        zone:
          type: string
          nullable: true
        warehouse_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        cash_desk_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        agent_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        agent_assignments:
          type: array
          items:
            type: object
            properties:
              slot:
                type: integer
                minimum: 1
                maximum: 10
              agent_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
                nullable: true
              visit_date:
                type: string
                nullable: true
              expeditor_phone:
                type: string
                nullable: true
              expeditor_user_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
                nullable: true
              visit_weekdays:
                type: array
                items:
                  type: integer
                  minimum: 1
                  maximum: 7
                maxItems: 7
            required:
              - slot
            additionalProperties: false
          maxItems: 10
        contact_persons:
          type: array
          items:
            type: object
            properties:
              firstName:
                type: string
                nullable: true
              lastName:
                type: string
                nullable: true
              phone:
                type: string
                nullable: true
            additionalProperties: false
          maxItems: 10
        is_active:
          type: boolean
      additionalProperties: false
    CreatePaymentBody:
      type: object
      properties:
        client_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
        order_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        amount:
          type: number
          exclusiveMinimum: true
          minimum: 0
        payment_type:
          type: string
          minLength: 1
          maxLength: 64
        note:
          type: string
          maxLength: 2000
          nullable: true
        cash_desk_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        paid_at:
          type: string
          maxLength: 40
          nullable: true
        entry_kind:
          type: string
          enum:
            - payment
            - client_expense
            - discount_settlement
        expeditor_user_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        ledger_agent_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        allocation_mode:
          type: string
          enum:
            - cash
            - consignment
            - none
        allocation_order_ids:
          type: array
          items:
            type: integer
            exclusiveMinimum: true
            minimum: 0
          maxItems: 500
        allocation_agent_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
      required:
        - client_id
        - amount
        - payment_type
      additionalProperties: false
    PatchPaymentBody:
      type: object
      properties:
        amount:
          type: number
          exclusiveMinimum: true
          minimum: 0
        payment_type:
          type: string
          minLength: 1
          maxLength: 64
        note:
          type: string
          maxLength: 2000
          nullable: true
        cash_desk_id:
          type: integer
          exclusiveMinimum: true
