        packagings:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                minLength: 1
                maxLength: 120
              quantity:
                type: integer
                exclusiveMinimum: true
                minimum: 0
                nullable: true
              width_cm:
                anyOf:
                  - type: number
                  - type: string
                nullable: true
              height_cm:
                anyOf:
                  - type: number
                  - type: string
                nullable: true
              length_cm:
                anyOf:
                  - type: number
                  - type: string
                nullable: true
              is_main:
                type: boolean
              sort_order:
                type: integer
                nullable: true
            required:
              - name
            additionalProperties: false
          maxItems: 30
        weight_kg:
          anyOf:
            - type: number
            - type: string
          nullable: true
        volume_m3:
          anyOf:
            - type: number
            - type: string
          nullable: true
        qty_per_block:
          type: integer
          nullable: true
        dimension_unit:
          type: string
          maxLength: 8
          nullable: true
        width_cm:
          anyOf:
            - type: number
            - type: string
          nullable: true
        height_cm:
          anyOf:
            - type: number
            - type: string
          nullable: true
        length_cm:
          anyOf:
            - type: number
            - type: string
          nullable: true
        ikpu_code:
          type: string
          maxLength: 64
          nullable: true
        hs_code:
          type: string
          maxLength: 32
          nullable: true
        sell_code:
          type: string
          maxLength: 64
          nullable: true
        comment:
          type: string
          nullable: true
        sort_order:
          type: integer
          nullable: true
        is_blocked:
          type: boolean
        is_equipment:
          type: boolean
      required:
        - sku
        - name
        - category_id
      additionalProperties: false
    ReportsDateRangeQuery:
      type: object
      additionalProperties:
        anyOf:
          - not: {}
          - anyOf:
              - type: string
              - not: {}
    ReportBuilderDatasetRequest:
      type: object
