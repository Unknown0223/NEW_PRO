components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        example: test1
  schemas:
    ApiError:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          type: string
          example: NotReady
        requestId:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true
    AuthLoginBody:
      type: object
      properties:
        slug:
          type: string
          minLength: 1
        login:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        device_name:
          type: string
          maxLength: 255
          nullable: true
        user_agent:
          type: string
          maxLength: 512
          nullable: true
      required:
        - slug
        - login
        - password
      additionalProperties: false
    CreateOrderBody:
      type: object
      properties:
        client_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
        warehouse_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
        agent_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        expeditor_user_id:
          type: integer
          exclusiveMinimum: true
          minimum: 0
          nullable: true
        price_type:
          type: string
          minLength: 1
          maxLength: 128
          nullable: true
        order_type:
          type: string
          enum:
            - order
            - return
            - exchange
            - partial_return
            - return_by_order
        apply_bonus:
          type: boolean
        bonus_gift_overrides:
          type: array
          items:
            type: object
            properties:
              bonus_rule_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              bonus_product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
            required:
              - bonus_rule_id
              - bonus_product_id
            additionalProperties: false
        comment:
          type: string
          maxLength: 4000
          nullable: true
        request_type_ref:
          type: string
          maxLength: 128
          nullable: true
        is_consignment:
          type: boolean
        consignment_due_date:
          type: string
          maxLength: 40
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              qty:
                type: number
                exclusiveMinimum: true
                minimum: 0
            required:
              - product_id
              - qty
            additionalProperties: false
          default: []
        payment_method_ref:
          type: string
          maxLength: 64
          nullable: true
        source_order_ids:
          type: array
          items:
            type: integer
            exclusiveMinimum: true
            minimum: 0
        minus_lines:
          type: array
          items:
            type: object
            properties:
              order_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              qty:
                type: number
                exclusiveMinimum: true
                minimum: 0
            required:
              - order_id
              - product_id
              - qty
            additionalProperties: false
        plus_lines:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
                exclusiveMinimum: true
                minimum: 0
              qty:
                type: number
                exclusiveMinimum: true
                minimum: 0
            required:
              - product_id
              - qty
            additionalProperties: false
        reason_ref:
          type: string
