/api/{slug}/orders:
  get:
    summary: Orders list (tenant)
    operationId: listOrders
    tags: [Orders]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../skeleton.yaml#/components/parameters/TenantSlug"
      - name: page
        in: query
        schema: { type: string }
      - name: limit
        in: query
        schema: { type: string }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"

  post:
    summary: Create order
    operationId: createOrder
    tags: [Orders]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../skeleton.yaml#/components/parameters/TenantSlug"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      "201":
        description: Created
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"


