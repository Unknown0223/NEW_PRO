/api/{slug}/reports/income-report:
  get:
    summary: Income report (payments by period)
    operationId: reportsIncome
    tags: [Reports]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../skeleton.yaml#/components/parameters/TenantSlug"
      - name: from
        in: query
        schema: { type: string }
      - name: to
        in: query
        schema: { type: string }
    responses:
      "200":
        description: OK
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"


