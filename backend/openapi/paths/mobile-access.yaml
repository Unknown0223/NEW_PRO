/api/{slug}/access/users/{id}/detail:
  get:
    summary: Access user detail (RBAC matrix)
    operationId: accessUserDetail
    tags: [Access]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../skeleton.yaml#/components/parameters/TenantSlug"
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    responses:
      "200":
        description: OK
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"
      "404":
        description: Not found
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"

