/api/{slug}/access/permissions/catalog:
  get:
    summary: Permission catalog (RBAC admin)
    operationId: accessPermissionsCatalog
    tags: [Access]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../skeleton.yaml#/components/parameters/TenantSlug"
    responses:
      "200":
        description: OK
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "../skeleton.yaml#/components/schemas/ApiError"


